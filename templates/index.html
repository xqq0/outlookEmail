<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>集成邮件管理</title>
    <link rel="icon" href="{{ url_for('favicon') }}" type="image/svg+xml">
    <!-- DOMPurify for XSS protection -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('bundled_index_css', v=frontend_asset_hash) }}">
    <link rel="stylesheet" id="activeSkinStylesheet" href="{{ url_for('active_skin_css', v=skin_asset_hash) }}">
</head>

<body>
    {% include "partials/index/layout.html" %}
    {% include "partials/index/dialogs-primary.html" %}
    {% include "partials/index/dialogs-management.html" %}
    {% include "partials/index/dialogs-oauth.html" %}

    <!-- 消息提示 -->
    <div class="toast" id="toast"></div>

    <script src="{{ url_for('static', filename='js/index/01-core.js', v=frontend_asset_hash) }}"></script>
    <script src="{{ url_for('static', filename='js/index/02-groups.js', v=frontend_asset_hash) }}"></script>
    <script src="{{ url_for('static', filename='js/index/03-temp-emails.js', v=frontend_asset_hash) }}"></script>
    <script src="{{ url_for('static', filename='js/index/04-accounts.js', v=frontend_asset_hash) }}"></script>
    <script src="{{ url_for('static', filename='js/index/05-emails.js', v=frontend_asset_hash) }}"></script>
    <script src="{{ url_for('static', filename='js/index/06-utils-oauth.js', v=frontend_asset_hash) }}"></script>
    <script src="{{ url_for('static', filename='js/index/07-settings.js', v=frontend_asset_hash) }}"></script>
    <script src="{{ url_for('static', filename='js/index/08-refresh.js', v=frontend_asset_hash) }}"></script>
    <script src="{{ url_for('static', filename='js/index/09-tags.js', v=frontend_asset_hash) }}"></script>
    <script src="{{ url_for('static', filename='js/index/10-batch-actions.js', v=frontend_asset_hash) }}"></script>
    <script src="{{ url_for('static', filename='js/index/11-email-shares.js', v=frontend_asset_hash) }}"></script>
    <script src="{{ url_for('static', filename='js/index/12-outlook-upload-accounts.js', v=frontend_asset_hash) }}"></script>

    <!-- 全屏查看邮件模态框 -->
    <div id="fullscreenEmailModal" class="fullscreen-email-modal" onmousedown="closeFullscreenEmailOnBackdrop(event)">
        <div class="fullscreen-email-header">
            <div class="fullscreen-email-title" id="fullscreenEmailTitle">邮件详情</div>
            <button class="fullscreen-close-btn" onclick="closeFullscreenEmail()">×</button>
        </div>
        <div class="fullscreen-email-content" id="fullscreenEmailContent">
            <!-- 邮件内容将在这里显示 -->
        </div>
    </div>

    <!-- 原始邮件源码模态框 -->
    <div id="rawEmailModal" class="fullscreen-email-modal raw-email-modal" onmousedown="closeRawEmailOnBackdrop(event)">
        <div class="fullscreen-email-header raw-email-header">
            <div>
                <div class="fullscreen-email-title" id="rawEmailTitle">原始邮件</div>
                <div class="raw-email-warning" id="rawEmailWarning">原始邮件包含完整邮件头和路由信息，请谨慎分享。</div>
            </div>
            <div class="raw-email-actions">
                <button class="raw-email-action-btn" type="button" onclick="copyRawEmailSource()">复制</button>
                <button class="raw-email-action-btn" type="button" onclick="downloadRawEmailSource()">下载 .eml</button>
                <button class="fullscreen-close-btn" onclick="closeRawEmailModal()">×</button>
            </div>
        </div>
        <pre class="raw-email-content" id="rawEmailContent">点击“显示原始邮件”加载 MIME 源码。</pre>
    </div>
</body>

</html>
