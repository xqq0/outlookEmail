<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>集成邮件查看器</title>
    <link rel="icon" href="{{ url_for('favicon') }}" type="image/svg+xml">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- DOMPurify for XSS protection -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://cdn.jsdelivr.net/npm/lucide/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/email-share.css') }}">
</head>

<body data-share-token="{{ share_token }}" data-share-status="{{ share_status }}">
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo-container">
                    {% include "partials/mail-brand-logo.html" %}
                    <span class="logo-text">集成邮件查看器 <span class="badge share-badge">共享链接</span></span>
                </div>
            </div>
            <div class="header-center">
                <div class="user-pill" id="copyEmailPill" title="点击复制邮箱">
                    <div class="avatar user-avatar" id="headerUserAvatar">?</div>
                    <span class="user-email" id="shareEmailTitle">{{ account_email or '分享链接' }}</span>
                    <i data-lucide="copy" class="copy-icon"></i>
                </div>
            </div>
            <div class="header-right">
                <div class="status-indicator active" id="shareStatusPill">
                    <span class="status-dot"></span>
                    <span id="shareStatusText">检查中</span>
                </div>
                <button class="theme-toggle" id="themeToggleBtn" type="button" aria-label="切换主题">
                    <i data-lucide="sun" class="sun-icon"></i>
                    <i data-lucide="moon" class="moon-icon"></i>
                </button>
            </div>
        </header>

        <!-- Main Body -->
        <div class="app-body" id="appBody">
            <!-- Sidebar / Folder Navigation -->
            <nav class="app-sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-title">文件夹</div>
                </div>
                <ul class="folder-list">
                    <li class="folder-item">
                        <button class="folder-btn active" type="button" data-folder="inbox">
                            <i data-lucide="inbox"></i>
                            <span>收件箱</span>
                            <span class="badge inbox-count" id="inboxCount" hidden></span>
                        </button>
                    </li>
                    <li class="folder-item">
                        <button class="folder-btn" type="button" data-folder="junkemail">
                            <i data-lucide="shield-alert"></i>
                            <span>垃圾邮件</span>
                        </button>
                    </li>
                </ul>
                <div class="sidebar-footer" id="shareMethodTagContainer">
                    <span id="shareMethodTag" class="method-tag"></span>
                </div>
            </nav>

            <!-- Middle Panel: Email List -->
            <section class="email-list-panel" id="emailListPanel">
                <div class="list-search-container">
                    <div class="search-wrapper">
                        <i data-lucide="search" class="search-icon"></i>
                        <input type="search" id="emailSearchInput" placeholder="搜索主题、发件人或内容..." aria-label="搜索邮件">
                        <button class="search-clear-btn" id="searchClearBtn" type="button" aria-label="清空搜索" hidden>
                            <i data-lucide="x"></i>
                        </button>
                    </div>
                </div>
                <div class="email-list" id="shareEmailList">
                    <div class="list-skeleton">
                        <div class="skeleton-item"></div>
                        <div class="skeleton-item"></div>
                        <div class="skeleton-item"></div>
                    </div>
                </div>
                <div class="list-footer">
                    <button class="load-more-btn" id="shareLoadMoreBtn" type="button" hidden>
                        <span>加载更多</span>
                        <i data-lucide="chevron-down"></i>
                    </button>
                </div>
            </section>

            <!-- Right Panel: Email Detail -->
            <main class="email-detail-panel" id="emailDetailPanel">
                <!-- Mobile back button to list view -->
                <div class="mobile-nav-bar">
                    <button class="mobile-back-btn" id="mobileBackBtn" type="button">
                        <i data-lucide="arrow-left"></i>
                        <span>返回邮件列表</span>
                    </button>
                </div>

                <div class="detail-container" id="shareEmailDetail">
                    <div class="empty-state">
                        <div class="empty-icon-wrapper">
                            <i data-lucide="mail-open" class="empty-icon"></i>
                        </div>
                        <h3>选择一封邮件</h3>
                        <p>点击左侧列表中的邮件以在此处查看其详细内容和附件。</p>
                    </div>
                </div>
            </main>
        </div>

        <!-- Invalid Link Screen Overlay -->
        <div class="overlay-screen" id="shareInvalidState" hidden>
            <div class="error-card">
                <div class="error-icon-wrapper">
                    <i data-lucide="link-2-off" class="error-icon"></i>
                </div>
                <h2 id="shareInvalidTitle">分享链接不可用</h2>
                <p>该分享链接可能已过期、被撤销，或者此邮箱账号已失效。请联系邮箱所有者重新获取分享链接。</p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/email-share.js') }}"></script>
</body>

</html>
